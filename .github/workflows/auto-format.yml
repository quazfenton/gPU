name: 3. Auto-Format & Fix
on:
  push:
    branches-ignore: [ main ] # Don't auto-commit directly to main
jobs:
  format-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
      - run: pip install ruff
      - run: ruff format .
      - run: ruff check --fix .
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format and fix linting errors"
