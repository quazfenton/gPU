# =============================================================================
# Notebook ML Orchestrator - Docker Compose Configuration
# =============================================================================
# For local development and production deployment
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Main Application Service
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-production}
    image: notebook-ml-orchestrator:${VERSION:-latest}
    container_name: notebook-ml-orchestrator
    restart: unless-stopped
    
    # Port mapping
    ports:
      - "${GUI_PORT:-7860}:7860"
      - "${GUI_WEBSOCKET_PORT:-7861}:7861"
    
    # Environment variables
    environment:
      # Application
      - APP_NAME=${APP_NAME:-Notebook ML Orchestrator}
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      
      # Security (REQUIRED - change in production!)
      - MASTER_KEY=${MASTER_KEY:-change-me-in-production-at-least-32-bytes}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-at-least-32-bytes}
      - CREDENTIAL_SALT=${CREDENTIAL_SALT:-change-me-in-production-64-hex-chars}
      
      # GUI Configuration
      - GUI_HOST=0.0.0.0
      - GUI_PORT=7860
      - GUI_WEBSOCKET_PORT=7861
      - GUI_ENABLE_AUTH=${GUI_ENABLE_AUTH:-false}
      - GUI_ENABLE_RATE_LIMITING=${GUI_ENABLE_RATE_LIMITING:-true}
      - GUI_RATE_LIMIT_PER_MINUTE=${GUI_RATE_LIMIT_PER_MINUTE:-60}
      - GUI_RATE_LIMIT_PER_HOUR=${GUI_RATE_LIMIT_PER_HOUR:-1000}
      - GUI_THEME=${GUI_THEME:-default}
      
      # Database
      - ORCHESTRATOR_DB_PATH=/app/data/orchestrator.db
      
      # Logging
      - ORCHESTRATOR_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ORCHESTRATOR_LOG_FILE=/app/logs/orchestrator.log
      
      # Security Logging
      - SECURITY_LOG_FILE=/app/logs/security.log
      - SECURITY_LOG_LEVEL=${SECURITY_LOG_LEVEL:-INFO}
      
      # Uploads
      - UPLOAD_DIR=/app/uploads
      - GUI_UPLOAD_DIR=/app/uploads
    
    # Volume mounts
    volumes:
      # Persistent data
      - orchestrator-data:/app/data
      - orchestrator-logs:/app/logs
      - orchestrator-uploads:/app/uploads
      
      # For development: mount source code
      - ./notebook_ml_orchestrator:/app/notebook_ml_orchestrator:ro
      - ./gui:/app/gui:ro
      - ./templates:/app/templates:ro
      
      # Environment file (optional)
      - ./.env:/app/.env:ro
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${CPU_RESERVATION:-0.5}'
          memory: ${MEMORY_RESERVATION:-1G}
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network
    networks:
      - orchestrator-network
    
    # Dependencies
    depends_on:
      - redis
  
  # ---------------------------------------------------------------------------
  # Redis - For caching and session management (optional)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: orchestrator-redis
    restart: unless-stopped
    
    # Optional: expose port
    # ports:
    #   - "6379:6379"
    
    # Volume for persistence
    volumes:
      - redis-data:/data
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    
    # Network
    networks:
      - orchestrator-network
    
    # Command
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
  
  # ---------------------------------------------------------------------------
  # PostgreSQL - Alternative database (optional, uncomment to use)
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: orchestrator-postgres
  #   restart: unless-stopped
  #   
  #   environment:
  #     - POSTGRES_USER=${DB_USER:-orchestrator}
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-change-me-in-production}
  #     - POSTGRES_DB=${DB_NAME:-orchestrator}
  #   
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U orchestrator"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   
  #   networks:
  #     - orchestrator-network
  
  # ---------------------------------------------------------------------------
  # Nginx - Reverse proxy (optional, for production)
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: orchestrator-nginx
  #   restart: unless-stopped
  #   
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/ssl:/etc/nginx/ssl:ro
  #     - orchestrator-uploads:/app/uploads:ro
  #   
  #   depends_on:
  #     - orchestrator
  #   
  #   networks:
  #     - orchestrator-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  orchestrator-data:
    driver: local
  orchestrator-logs:
    driver: local
  orchestrator-uploads:
    driver: local
  redis-data:
    driver: local
  # postgres-data:
  #   driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  orchestrator-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Usage Instructions:
# =============================================================================
# 
# Development:
#   docker-compose up -d
#   docker-compose logs -f orchestrator
#
# Production:
#   # Set environment variables first!
#   export MASTER_KEY=$(python -c "import secrets; print(secrets.token_hex(32))")
#   export JWT_SECRET=$(python -c "import secrets; print(secrets.token_hex(32))")
#   export CREDENTIAL_SALT=$(python -c "import secrets; print(secrets.token_hex(32))")
#   
#   docker-compose -f docker-compose.yml up -d
#
# Development with hot reload:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# View logs:
#   docker-compose logs -f
#   docker-compose logs -f orchestrator
#
# Stop:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
#
# Scale (for production):
#   docker-compose up -d --scale orchestrator=3
#
# =============================================================================
