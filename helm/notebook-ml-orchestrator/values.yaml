#   image: datadog/agent:latest
#   env:
#     - name: DD_API_KEY
#       valueFrom:
#         secretKeyRef:
#           name: datadog-secret
#           key: api-key

# =============================================================================
# Init Containers (optional)
# =============================================================================

initContainers: []
