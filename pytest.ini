[tool:pytest]
# Pytest configuration for Notebook ML Orchestrator

# Test discovery
testpaths = notebook_ml_orchestrator/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=notebook_ml_orchestrator
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests across components
    property: Property-based tests using Hypothesis
    slow: Tests that take longer to run
    database: Tests that require database operations
    backend: Tests that require backend connections
    gui: Tests for GUI components
    workflow: Tests for workflow functionality
    batch: Tests for batch processing
    template: Tests for template system
    security: Tests for security features

# Test filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:hypothesis.*

# Minimum Python version
minversion = 6.0

# Timeout for tests (in seconds)
timeout = 300

# Parallel execution
# addopts = -n auto  # Uncomment to enable pytest-xdist for parallel execution